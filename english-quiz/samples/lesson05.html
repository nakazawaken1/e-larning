<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 300px; }
        #question { font-size: 24px; font-weight: bold; color: #1e293b; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 10px; background: #e2e8f0; color: #475569; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0ea5e9; color: white; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="question">apple</div>
        <div class="options">
            <button onclick="alert('正解！')">りんご</button>
            <button onclick="alert('正解！')">ばなな</button>
            <button onclick="alert('正解！')">みかん</button>
        </div>
    </div>
</body>
</html>
