<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        #question { font-size: 24px; font-weight: bold; color: #1e293b; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 10px; background: #e2e8f0; color: #475569; font-weight: bold; cursor: pointer; font-size: 16px; }

        @media (max-width: 480px) {
            .quiz-container { padding: 15px; }
            #question { font-size: 20px; }
            button { padding: 10px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="question">apple</div>
        <div class="options">
            <button>りんご</button>
            <button>ばなな</button>
            <button>みかん</button>
        </div>
    </div>
    <p style="font-size: 12px; color: #94a3b8; margin-top: 20px;">画面をちいさくしてみてね！</p>
</body>
</html>
