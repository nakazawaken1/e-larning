<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 300px; position: relative; }
        #question { font-size: 24px; font-weight: bold; color: #1e293b; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 10px; background: #e2e8f0; color: #475569; font-weight: bold; cursor: pointer; }
        
        .correct-anim { animation: success 0.5s ease-out; background: #dcfce7 !important; color: #166534 !important; }
        @keyframes success {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="question">apple</div>
        <div class="options">
            <button onclick="check(this, 'correct')">りんご</button>
            <button onclick="check(this, 'wrong')">ばなな</button>
            <button onclick="check(this, 'wrong')">みかん</button>
        </div>
    </div>
    <script>
        function check(btn, status) {
            if (status === 'correct') {
                btn.classList.add('correct-anim');
                setTimeout(() => btn.classList.remove('correct-anim'), 500);
            } else {
                alert('ざんねん...');
            }
        }
    </script>
</body>
</html>
