<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>わたしの図鑑</title>
    <style>
        body {
            background-color: #f0f8ff;
        }

        h1 {
            color: #2e8b57;
        }

        h2 {
            color: #ff6347;
        }

        .zukan-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            background-color: white;
            width: 250px;
            padding: 15px;
        }
    </style>
</head>

<body>
    <h1>わたしの図鑑</h1>

    <div class="zukan-container">
        <div class="card">
            <h2>アサガオ</h2>
            <img src="https://placehold.jp/240x180.png?text=アサガオ" alt="アサガオの写真" width="200">
            <p>夏にきれいに咲く花です。</p>
            <ul>
                <li>場所：学校の花壇</li>
                <li>日付：7月20日</li>
            </ul>
        </div>

        <div class="card">
            <h2>カブトムシ</h2>
            <img src="https://placehold.jp/240x180.png?text=カブトムシ" alt="カブトムシの写真" width="200">
            <p>かっこいいツノがある夏の虫です。</p>
            <ul>
                <li>場所：近くの森</li>
                <li>日付：8月5日</li>
            </ul>
        </div>
    </div>
</body>

</html>
