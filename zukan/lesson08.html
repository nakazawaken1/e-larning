<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>わたしの図鑑</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: sans-serif;
        }

        h1 {
            color: #2e8b57;
            text-align: center;
        }

        h2 {
            color: #ff6347;
            margin-top: 5px;
        }

        .zukan-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            background-color: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        img {
            border-radius: 8px;
            cursor: pointer;
            /* 追加 */
        }

        ul {
            list-style: none;
            padding: 0;
            color: #666;
            font-size: 14px;
            text-align: left;
        }

        li {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <h1>わたしの図鑑</h1>

    <div class="zukan-container">
        <div class="card">
            <h2>アサガオ</h2>
            <img src="https://placehold.jp/240x180.png?text=アサガオ" alt="アサガオの写真" width="200" onclick="alert('アサガオだよ！')">
            <p>夏にきれいに咲く花です。</p>
            <ul>
                <li>📍 場所：学校の花壇</li>
                <li>📅 日付：7月20日</li>
            </ul>
        </div>

        <div class="card">
            <h2>カブトムシ</h2>
            <img src="https://placehold.jp/240x180.png?text=カブトムシ" alt="カブトムシの写真" width="200"
                onclick="alert('カブトムシだよ！')">
            <p>かっこいいツノがある夏の虫です。</p>
            <ul>
                <li>📍 場所：近くの森</li>
                <li>📅 日付：8月5日</li>
            </ul>
        </div>
    </div>

    <script>
        console.log("図鑑のプログラムがスタートしました！");

        let aisatsu = "こんにちは！";
        console.log(aisatsu);

        let mushi = "カブトムシ";
        console.log("私が見つけたのは " + mushi + " です。");
    </script>
</body>

</html>
