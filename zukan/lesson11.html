<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>わたしの図鑑</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: sans-serif;
        }

        h1 {
            color: #2e8b57;
            text-align: center;
            padding-top: 20px;
        }

        h2 {
            color: #ff6347;
            margin-top: 5px;
        }

        .add-form {
            background-color: white;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .add-form h2 {
            color: #2e8b57;
        }

        .add-form input {
            display: block;
            width: 80%;
            margin: 8px auto;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        .add-form button {
            margin-top: 12px;
            padding: 10px 24px;
            background-color: #2e8b57;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .add-form button:hover {
            background-color: #236b43;
        }

        .zukan-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background-color: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        img {
            border-radius: 8px;
        }

        ul {
            list-style: none;
            padding: 0;
            color: #666;
            font-size: 14px;
            text-align: left;
        }

        li {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <h1>わたしの図鑑</h1>

    <div class="add-form">
        <h2>🐾 生き物を追加する</h2>
        <input id="input-name" type="text" placeholder="名前（例：タンポポ）">
        <input id="input-place" type="text" placeholder="場所（例：公園）">
        <input id="input-date" type="text" placeholder="日付（例：3月5日）">
        <input id="input-memo" type="text" placeholder="メモ（例：黄色い花）">
        <button onclick="addIkimono()">追加する！</button>
    </div>

    <div id="zukan-container" class="zukan-container"></div>

    <script>
        let zukanData = [
            {
                name: "アサガオ",
                image: "https://placehold.jp/240x180.png?text=アサガオ",
                description: "夏にきれいに咲く花です。",
                place: "学校の花壇",
                date: "7月20日"
            },
            {
                name: "カブトムシ",
                image: "https://placehold.jp/240x180.png?text=カブトムシ",
                description: "かっこいいツノがある夏の虫です。",
                place: "近くの森",
                date: "8月5日"
            }
        ];

        let container = document.getElementById("zukan-container");

        // カードを1つ描く関数
        function renderCard(ikimono) {
            let cardHTML = `
        <div class="card" onclick="alert('${ikimono.name}だよ！')">
          <h2>${ikimono.name}</h2>
          <img src="${ikimono.image}" alt="${ikimono.name}の写真" width="200">
          <p>${ikimono.description}</p>
          <ul>
            <li>📍 場所：${ikimono.place}</li>
            <li>📅 日付：${ikimono.date}</li>
          </ul>
        </div>
      `;
            container.innerHTML += cardHTML;
        }

        // 最初のリストを表示する
        zukanData.forEach(renderCard);

        // フォームから新しい生き物を追加する関数
        function addIkimono() {
            let name = document.getElementById("input-name").value;
            let place = document.getElementById("input-place").value;
            let date = document.getElementById("input-date").value;
            let memo = document.getElementById("input-memo").value;

            if (name === "") {
                alert("名前を入力してください！");
                return;
            }

            let newIkimono = {
                name: name,
                image: "https://placehold.jp/240x180.png?text=" + encodeURIComponent(name),
                description: memo,
                place: place,
                date: date
            };

            renderCard(newIkimono);

            document.getElementById("input-name").value = "";
            document.getElementById("input-place").value = "";
            document.getElementById("input-date").value = "";
            document.getElementById("input-memo").value = "";
        }
    </script>
</body>

</html>
